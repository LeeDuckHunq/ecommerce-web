<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — M.Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.13);
      --text: #1a1a1a;
      --muted: #888880;
      --green: #2a7a4f;
      --green-bg: #eaf4ee;
      --green-border: rgba(42,122,79,0.2);
      --red: #c0392b;
      --red-bg: #fdecea;
      --red-border: rgba(192,57,43,0.2);
      --purple: #6c47ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.1rem; letter-spacing: -0.04em;
      color: var(--text); text-decoration: none;
    }
    .logo span { color: var(--purple); }
    .back-btn {
      font-size: 0.8rem; color: var(--muted); text-decoration: none;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }

    /* ── Page ── */
    .page { max-width: 640px; margin: 0 auto; padding: 40px 40px 80px; }

    .hero-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
      margin-bottom: 32px; color: var(--text);
    }
    h1 em { font-style: italic; color: var(--purple); }

    /* ── Skeleton loader ── */
    .skeleton-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 8px;
    }
    .skel {
      background: linear-gradient(90deg, #ececec 25%, #f5f5f5 50%, #ececec 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel-icon  { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .skel-line  { height: 12px; border-radius: 4px; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Cart items ── */
    #cart { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .item:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .item:nth-child(1){animation-delay:0.05s}
    .item:nth-child(2){animation-delay:0.10s}
    .item:nth-child(3){animation-delay:0.15s}
    .item:nth-child(4){animation-delay:0.20s}
    .item:nth-child(5){animation-delay:0.25s}

    .item-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .item-price {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--text); text-align: right; flex-shrink: 0;
    }
    .item-price small { font-size: 0.65rem; font-weight: 500; color: var(--muted); margin-left: 2px; }

    /* ── Summary ── */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      animation: fadeUp 0.5s ease both;
    }
    .summary-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0;
    }
    .summary-row + .summary-row { border-top: 1px solid var(--border); }
    .summary-label { font-size: 0.82rem; color: var(--muted); }
    .summary-value { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .summary-total .summary-label { font-size: 0.9rem; color: var(--text); font-weight: 500; }
    .summary-total .summary-value { font-size: 1.15rem; letter-spacing: -0.03em; }

    .checkout-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 16px;
      padding: 13px;
      background: #1a1a1a; color: #ffffff;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700; letter-spacing: -0.01em;
      cursor: pointer; transition: background 0.15s, transform 0.12s;
    }
    .checkout-btn:hover:not(:disabled) { background: #333; }
    .checkout-btn:active:not(:disabled) { transform: scale(0.98); }
    .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 80px 20px; animation: fadeUp 0.5s ease; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700; margin-bottom: 6px;
    }
    .empty p { color: var(--muted); font-size: 0.83rem; margin-bottom: 14px; }
    .empty a {
      font-size: 0.82rem; color: var(--purple); text-decoration: none; font-weight: 500;
    }
    .empty a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 6px; z-index: 999;
    }
    .toast {
      background: #1a1a1a; color: #fff;
      border-radius: 10px; padding: 10px 16px; font-size: 0.82rem;
      display: flex; align-items: center; gap: 8px;
      animation: toastIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .toast-icon { font-size: 0.85rem; }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .page  { padding: 28px 20px 60px; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">M<span>.</span>Shop</a>
  <a href="index.html" class="back-btn">← Back to Shop</a>
</header>

<div class="page">
  <div class="hero-label">Your order</div>
  <h1>Your<br><em>Cart</em></h1>

  <div id="cart">
    <div class="skeleton-item">
      <div class="skel skel-icon"></div>
      <div class="skel-lines">
        <div class="skel skel-line" style="width:55%"></div>
        <div class="skel skel-line" style="width:35%"></div>
      </div>
      <div class="skel skel-line" style="width:70px;height:14px"></div>
    </div>
    <div class="skeleton-item">
      <div class="skel skel-icon"></div>
      <div class="skel-lines">
        <div class="skel skel-line" style="width:65%"></div>
        <div class="skel skel-line" style="width:40%"></div>
      </div>
      <div class="skel skel-line" style="width:70px;height:14px"></div>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="summary-row">
      <span class="summary-label">Items</span>
      <span class="summary-value" id="itemCount">—</span>
    </div>
    <div class="summary-row summary-total">
      <span class="summary-label">Total</span>
      <span class="summary-value" id="totalPrice">—</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Checkout →</span>
    </button>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const ICONS = ['📦','🛍️','🎁','⭐','💎','🔥','✨','🎯'];
  const user = JSON.parse(localStorage.getItem('user'));

  if (!user) {
    window.location = 'login.html';
  }

  function formatPrice(n) {
    return Number(n).toLocaleString('en-US');
  }

  function showToast(msg, isError = false) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.innerHTML = `<span class="toast-icon">${isError ? '⚠' : '✓'}</span>${msg}`;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  fetch(`https://ecommerce-web-production-3aa3.up.railway.app/cart/${user.id}`)
    .then(res => res.json())
    .then(data => {
      const cartEl = document.getElementById('cart');

      if (!data.length) {
        cartEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.</p>
            <a href="index.html">← Browse products</a>
          </div>`;
        return;
      }

      let html = '';
      data.forEach((item, i) => {
        const icon = ICONS[i % ICONS.length];
        html += `
          <div class="item">
            <div class="item-icon">${icon}</div>
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-sub">Product</div>
            </div>
            <div class="item-price">${formatPrice(item.price)}<small>VND</small></div>
          </div>
        `;
      });
      cartEl.innerHTML = html;

      const total = data.reduce((s, i) => s + Number(i.price), 0);
      document.getElementById('itemCount').textContent = `${data.length} item${data.length !== 1 ? 's' : ''}`;
      document.getElementById('totalPrice').textContent = formatPrice(total) + ' VND';
      document.getElementById('summary').style.display = 'block';
    })
    .catch(() => {
      document.getElementById('cart').innerHTML =
        '<p style="color:var(--muted);padding:20px 0;">Could not load cart.</p>';
    });

  function checkout() {
    const btn = document.getElementById('checkoutBtn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btnText');

    btn.disabled = true;
    spinner.style.display = 'block';
    text.textContent = 'Processing…';

    fetch('https://ecommerce-web-production-3aa3.up.railway.app/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: user.id })
    })
    .then(() => {
      showToast('Payment successful! Thank you 🎉');
      document.getElementById('cart').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎉</div>
          <h3>Order placed!</h3>
          <p>Your payment was successful. We'll get it ready soon.</p>
          <a href="index.html">← Keep shopping</a>
        </div>`;
      document.getElementById('summary').style.display = 'none';
    })
    .catch(() => {
      btn.disabled = false;
      spinner.style.display = 'none';
      text.textContent = 'Checkout →';
      showToast('Payment failed. Please try again.', true);
    });
  }
</script>

</body>
</html>
