<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.13);
      --text: #1a1a1a;
      --muted: #888880;
      --green: #2a7a4f;
      --green-bg: #eaf4ee;
      --green-border: rgba(42,122,79,0.2);
      --red: #c0392b;
      --red-bg: #fdecea;
      --red-border: rgba(192,57,43,0.2);
      --yellow: #8a6400;
      --yellow-bg: #fef8e6;
      --yellow-border: rgba(138,100,0,0.2);
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
 
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.1rem; letter-spacing: -0.04em;
      color: var(--text); text-decoration: none;
    }
    .logo span { color: #6c47ff; }
    .admin-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      background: #f0eeff;
      border: 1px solid rgba(108,71,255,0.2);
      border-radius: 99px;
      color: #6c47ff;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%; background: #6c47ff;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
 
    .page { max-width: 900px; margin: 0 auto; padding: 40px 40px 80px; }
 
    .hero-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
      margin-bottom: 24px; color: var(--text);
    }
 
    .stats { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px; min-width: 100px;
      animation: fadeUp 0.4s ease both;
    }
    .stat:nth-child(1){animation-delay:0.05s}
    .stat:nth-child(2){animation-delay:0.10s}
    .stat:nth-child(3){animation-delay:0.15s}
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.04em; color: var(--text);
    }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
 
    .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border-md); }
    .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #ffffff; }
 
    #orders { display: flex; flex-direction: column; gap: 8px; }
 
    .order-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      animation: fadeUp 0.45s ease both;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .order-row:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .order-row:nth-child(1){animation-delay:0.05s}
    .order-row:nth-child(2){animation-delay:0.10s}
    .order-row:nth-child(3){animation-delay:0.15s}
    .order-row:nth-child(4){animation-delay:0.20s}
    .order-row:nth-child(5){animation-delay:0.25s}
 
    .order-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      color: var(--muted); letter-spacing: 0.04em; min-width: 46px;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-id {
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
    }
    .order-meta { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }
 
    .status-badge {
      padding: 3px 10px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
    }
    .status-badge.pending  { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
    .status-badge.approved { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .status-badge.rejected { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
 
    .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      padding: 6px 12px; border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: 1px solid;
    }
    .btn-approve { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
    .btn-approve:hover { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-reject  { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red); }
    .btn-reject:hover  { background: var(--red);  color: #fff; border-color: var(--red); }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .action-btn:active:not(:disabled) { transform: scale(0.96); }
 
    .empty { text-align: center; padding: 80px 20px; animation: fadeUp 0.5s ease; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .empty p { color: var(--muted); font-size: 0.83rem; }
 
    .toast-wrap {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 6px; z-index: 999;
    }
    .toast {
      background: #1a1a1a; color: #fff;
      border-radius: 10px; padding: 10px 16px; font-size: 0.82rem;
      display: flex; align-items: center; gap: 8px;
      animation: toastIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .toast.error { background: var(--red); }
 
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
 
    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .page  { padding: 28px 20px 60px; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">M<span>.</span>Shop</a>
  <a href="index.html" class="back-btn">← Back to Shop</a>
</header>

<div class="page">
  <div class="hero-label">Your order</div>
  <h1>Your<br><em>Cart</em></h1>

  <div id="cart">
    <!-- skeletons -->
    <div class="skeleton-item">
      <div class="skel skel-icon"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:55%"></div><div class="skel skel-line" style="width:35%"></div></div>
      <div class="skel skel-line" style="width:70px;height:14px"></div>
    </div>
    <div class="skeleton-item">
      <div class="skel skel-icon"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:65%"></div><div class="skel skel-line" style="width:40%"></div></div>
      <div class="skel skel-line" style="width:70px;height:14px"></div>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="summary-row">
      <span class="summary-label">Items</span>
      <span class="summary-value" id="itemCount">—</span>
    </div>
    <div class="summary-row summary-total">
      <span class="summary-label">Total</span>
      <span class="summary-value" id="totalPrice">—</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Checkout →</span>
    </button>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const ICONS = ['📦','🛍️','🎁','⭐','💎','🔥','✨','🎯'];
  const user = JSON.parse(localStorage.getItem('user'));

  if (!user) {
    window.location = 'login.html';
  }

  function formatPrice(n) {
    return Number(n).toLocaleString('en-US');
  }

  function showToast(msg) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<span class="toast-icon">✓</span>${msg}`;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  let cartItems = [];

  fetch(`https://ecommerce-web-production-3aa3.up.railway.app/cart/${user.id}`)
    .then(res => res.json())
    .then(data => {
      cartItems = data;
      const cartEl = document.getElementById('cart');

      if (!data.length) {
        cartEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.</p>
            <a href="index.html">← Browse products</a>
          </div>`;
        return;
      }

      let html = '';
      data.forEach((item, i) => {
        const icon = ICONS[i % ICONS.length];
        html += `
          <div class="item">
            <div class="item-icon">${icon}</div>
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-sub">Product</div>
            </div>
            <div class="item-price">${formatPrice(item.price)}<small>VND</small></div>
          </div>
        `;
      });
      cartEl.innerHTML = html;

      // Summary
      const total = data.reduce((s, i) => s + Number(i.price), 0);
      document.getElementById('itemCount').textContent = `${data.length} item${data.length !== 1 ? 's' : ''}`;
      document.getElementById('totalPrice').textContent = formatPrice(total) + ' VND';
      document.getElementById('summary').style.display = 'block';
    })
    .catch(() => {
      document.getElementById('cart').innerHTML =
        '<p style="color:var(--muted);padding:20px 0;">Could not load cart.</p>';
    });

  function checkout() {
    const btn = document.getElementById('checkoutBtn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btnText');

    btn.disabled = true;
    spinner.style.display = 'block';
    text.textContent = 'Processing…';

    fetch('https://ecommerce-web-production-3aa3.up.railway.app/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: user.id })
    })
    .then(() => {
      showToast('Payment successful! Thank you 🎉');
      document.getElementById('cart').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎉</div>
          <h3>Order placed!</h3>
          <p>Your payment was successful. We'll get it ready soon.</p>
          <a href="index.html">← Keep shopping</a>
        </div>`;
      document.getElementById('summary').style.display = 'none';
    })
    .catch(() => {
      btn.disabled = false;
      spinner.style.display = 'none';
      text.textContent = 'Checkout →';
      showToast('⚠ Payment failed. Please try again.');
    });
  }
</script>

</body>
</html>
