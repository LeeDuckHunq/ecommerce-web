<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.13);
      --text: #1a1a1a;
      --muted: #888880;
      --green: #2a7a4f;
      --green-bg: #eaf4ee;
      --green-border: rgba(42,122,79,0.2);
      --red: #c0392b;
      --red-bg: #fdecea;
      --red-border: rgba(192,57,43,0.2);
      --yellow: #8a6400;
      --yellow-bg: #fef8e6;
      --yellow-border: rgba(138,100,0,0.2);
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
 
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.1rem; letter-spacing: -0.04em;
      color: var(--text); text-decoration: none;
    }
    .logo span { color: #6c47ff; }
    .admin-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      background: #f0eeff;
      border: 1px solid rgba(108,71,255,0.2);
      border-radius: 99px;
      color: #6c47ff;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%; background: #6c47ff;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
 
    .page { max-width: 900px; margin: 0 auto; padding: 40px 40px 80px; }
 
    .hero-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1;
      margin-bottom: 24px; color: var(--text);
    }
 
    .stats { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px; min-width: 100px;
      animation: fadeUp 0.4s ease both;
    }
    .stat:nth-child(1){animation-delay:0.05s}
    .stat:nth-child(2){animation-delay:0.10s}
    .stat:nth-child(3){animation-delay:0.15s}
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.04em; color: var(--text);
    }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
 
    .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border-md); }
    .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #ffffff; }
 
    #orders { display: flex; flex-direction: column; gap: 8px; }
 
    .order-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      animation: fadeUp 0.45s ease both;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .order-row:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .order-row:nth-child(1){animation-delay:0.05s}
    .order-row:nth-child(2){animation-delay:0.10s}
    .order-row:nth-child(3){animation-delay:0.15s}
    .order-row:nth-child(4){animation-delay:0.20s}
    .order-row:nth-child(5){animation-delay:0.25s}
 
    .order-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      color: var(--muted); letter-spacing: 0.04em; min-width: 46px;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-id {
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
    }
    .order-meta { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }
 
    .status-badge {
      padding: 3px 10px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
    }
    .status-badge.pending  { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
    .status-badge.approved { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .status-badge.rejected { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
 
    .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      padding: 6px 12px; border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: 1px solid;
    }
    .btn-approve { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
    .btn-approve:hover { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-reject  { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red); }
    .btn-reject:hover  { background: var(--red);  color: #fff; border-color: var(--red); }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .action-btn:active:not(:disabled) { transform: scale(0.96); }
 
    .empty { text-align: center; padding: 80px 20px; animation: fadeUp 0.5s ease; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .empty p { color: var(--muted); font-size: 0.83rem; }
 
    .toast-wrap {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 6px; z-index: 999;
    }
    .toast {
      background: #1a1a1a; color: #fff;
      border-radius: 10px; padding: 10px 16px; font-size: 0.82rem;
      display: flex; align-items: center; gap: 8px;
      animation: toastIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .toast.error { background: var(--red); }
 
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
 
    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .page  { padding: 28px 20px 60px; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">M<span>.</span>Shop</a>
  <div class="admin-badge">Admin Panel</div>
</header>

<div class="page">
  <div class="hero-label">Management</div>
  <h1>Order<br><em>Dashboard</em></h1>

  <div class="stats" id="stats">
    <div class="stat"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value" id="statPending" style="color:var(--yellow)">—</span><span class="stat-label">Pending</span></div>
    <div class="stat"><span class="stat-value" id="statApproved" style="color:var(--green)">—</span><span class="stat-label">Approved</span></div>
    <div class="stat"><span class="stat-value" id="statRejected" style="color:var(--red)">—</span><span class="stat-label">Rejected</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
  </div>

  <div id="orders">
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:40%"></div><div class="skel skel-line" style="width:25%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:50%"></div><div class="skel skel-line" style="width:30%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:35%"></div><div class="skel skel-line" style="width:20%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  let allOrders = [];
  let activeFilter = 'all';

  function showToast(msg, isError = false) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.innerHTML = `<span class="toast-icon">${isError ? '⚠' : '✓'}</span>${msg}`;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function statusLabel(s) {
    const map = { pending: '⏳ Pending', approved: '✓ Approved', rejected: '✕ Rejected' };
    return map[s] || s;
  }

  function renderOrders(orders) {
    const el = document.getElementById('orders');
    const filtered = activeFilter === 'all' ? orders : orders.filter(o => o.status === activeFilter);

    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <h3>No orders found</h3>
          <p>Nothing matches this filter right now.</p>
        </div>`;
      return;
    }

    el.innerHTML = filtered.map((o, i) => `
      <div class="order-row" id="row-${o.id}">
        <div class="order-num">#${String(o.id).padStart(3, '0')}</div>
        <div class="order-info">
          <div class="order-id">Order ${o.id}</div>
          <div class="order-meta">User ID: ${o.user_id || '—'}</div>
        </div>
        <div class="status-badge ${o.status}">${statusLabel(o.status)}</div>
        <div class="actions">
          <button class="action-btn btn-approve" onclick="update(${o.id}, 'approved')"
            ${o.status === 'approved' ? 'disabled' : ''}>✓ OK</button>
          <button class="action-btn btn-reject" onclick="update(${o.id}, 'rejected')"
            ${o.status === 'rejected' ? 'disabled' : ''}>✕ No</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent    = orders.length;
    document.getElementById('statPending').textContent  = orders.filter(o => o.status === 'pending').length;
    document.getElementById('statApproved').textContent = orders.filter(o => o.status === 'approved').length;
    document.getElementById('statRejected').textContent = orders.filter(o => o.status === 'rejected').length;
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(allOrders);
  }

  fetch('https://ecommerce-web-production-3aa3.up.railway.app/orders')
    .then(res => res.json())
    .then(data => {
      allOrders = data;
      updateStats(data);
      renderOrders(data);
    })
    .catch(() => {
      document.getElementById('orders').innerHTML =
        '<p style="color:var(--muted);padding:20px 0;">Could not load orders.</p>';
    });

  function update(id, status) {
    const row = document.getElementById(`row-${id}`);
    const btns = row.querySelectorAll('.action-btn');
    btns.forEach(b => b.disabled = true);

    fetch(`https://ecommerce-web-production-3aa3.up.railway.app/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    })
    .then(() => {
      // Update in-memory data
      const order = allOrders.find(o => o.id === id);
      if (order) order.status = status;

      updateStats(allOrders);
      renderOrders(allOrders);

      const label = status === 'approved' ? 'approved ✓' : 'rejected ✕';
      showToast(`Order #${String(id).padStart(3,'0')} ${label}`);
    })
    .catch(() => {
      btns.forEach(b => b.disabled = false);
      showToast('Failed to update order.', true);
    });
  }
</script>

</body>
</html>
