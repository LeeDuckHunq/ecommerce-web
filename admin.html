<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --surface2: #1f1f23;
      --border: rgba(255,255,255,0.07);
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --text: #f0f0ef;
      --muted: #6b6b72;
      --card-hover: #222228;
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --red: #ff7070;
      --red-dim: rgba(255,112,112,0.12);
      --yellow: #fbbf24;
      --yellow-dim: rgba(251,191,36,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      background: rgba(14,14,15,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.3rem; letter-spacing: -0.03em;
      color: var(--text); text-decoration: none;
    }
    .logo span { color: var(--accent); }

    .admin-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--accent-dim);
      border: 1px solid rgba(232,255,71,0.2);
      border-radius: 99px;
      color: var(--accent);
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .admin-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* Page */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px 100px;
    }

    .hero-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px;
    }
    .hero-label::before {
      content: ''; display: block;
      width: 20px; height: 1px; background: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 800; letter-spacing: -0.04em; line-height: 1;
      margin-bottom: 12px;
    }
    h1 em { font-style: normal; color: var(--accent); }

    /* Stats row */
    .stats {
      display: flex; gap: 12px;
      margin-bottom: 40px; flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex; flex-direction: column; gap: 2px;
      animation: fadeUp 0.4s ease both;
      min-width: 110px;
    }
    .stat:nth-child(1) { animation-delay: 0.05s; }
    .stat:nth-child(2) { animation-delay: 0.10s; }
    .stat:nth-child(3) { animation-delay: 0.15s; }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Filters */
    .filters {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: rgba(232,255,71,0.3);
      color: var(--accent);
    }

    /* Orders list */
    #orders { display: flex; flex-direction: column; gap: 10px; }

    .order-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      animation: fadeUp 0.45s ease both;
      transition: background 0.2s, border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .order-row::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,255,71,0.2), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .order-row:hover { background: var(--card-hover); border-color: rgba(232,255,71,0.1); }
    .order-row:hover::after { opacity: 1; }

    .order-row:nth-child(1) { animation-delay: 0.05s; }
    .order-row:nth-child(2) { animation-delay: 0.10s; }
    .order-row:nth-child(3) { animation-delay: 0.15s; }
    .order-row:nth-child(4) { animation-delay: 0.20s; }
    .order-row:nth-child(5) { animation-delay: 0.25s; }

    .order-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      color: var(--muted); letter-spacing: 0.04em;
      min-width: 52px;
    }

    .order-info { flex: 1; min-width: 0; }
    .order-id {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .order-meta { font-size: 0.77rem; color: var(--muted); margin-top: 2px; }

    /* Status badge */
    .status-badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      white-space: nowrap;
    }
    .status-badge.pending  { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
    .status-badge.approved { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(74,222,128,0.2); }
    .status-badge.rejected { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(255,112,112,0.2); }

    /* Action buttons */
    .actions { display: flex; gap: 8px; flex-shrink: 0; }

    .action-btn {
      padding: 7px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid;
      display: flex; align-items: center; gap: 5px;
    }

    .btn-approve {
      background: var(--green-dim);
      border-color: rgba(74,222,128,0.25);
      color: var(--green);
    }
    .btn-approve:hover { background: var(--green); color: #0e0e0f; border-color: var(--green); }

    .btn-reject {
      background: var(--red-dim);
      border-color: rgba(255,112,112,0.25);
      color: var(--red);
    }
    .btn-reject:hover { background: var(--red); color: #fff; border-color: var(--red); }

    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-btn:active:not(:disabled) { transform: scale(0.96); }

    /* Skeletons */
    .skeleton-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
    }
    .skel {
      background: linear-gradient(90deg, var(--surface2) 25%, #28282e 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    .skel-sm { width: 52px; height: 12px; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skel-line { height: 12px; }
    .skel-badge { width: 70px; height: 24px; border-radius: 99px; }
    .skel-btn { width: 60px; height: 32px; border-radius: 8px; }

    /* Empty */
    .empty {
      text-align: center; padding: 80px 20px;
      animation: fadeUp 0.5s ease;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .empty p { color: var(--muted); font-size: 0.87rem; }

    /* Toast */
    .toast-wrap {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 999;
    }
    .toast {
      background: var(--surface);
      border: 1px solid rgba(232,255,71,0.25); border-radius: 12px;
      padding: 12px 18px; font-size: 0.85rem;
      display: flex; align-items: center; gap: 10px;
      animation: toastIn 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.error { border-color: rgba(255,112,112,0.3); }
    .toast-icon { color: var(--accent); }
    .toast.error .toast-icon { color: var(--red); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .page  { padding: 40px 20px 80px; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">M<span>.</span>Shop</a>
  <div class="admin-badge">Admin Panel</div>
</header>

<div class="page">
  <div class="hero-label">Management</div>
  <h1>Order<br><em>Dashboard</em></h1>

  <div class="stats" id="stats">
    <div class="stat"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value" id="statPending" style="color:var(--yellow)">—</span><span class="stat-label">Pending</span></div>
    <div class="stat"><span class="stat-value" id="statApproved" style="color:var(--green)">—</span><span class="stat-label">Approved</span></div>
    <div class="stat"><span class="stat-value" id="statRejected" style="color:var(--red)">—</span><span class="stat-label">Rejected</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
  </div>

  <div id="orders">
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:40%"></div><div class="skel skel-line" style="width:25%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:50%"></div><div class="skel skel-line" style="width:30%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-row">
      <div class="skel skel-sm"></div>
      <div class="skel-lines"><div class="skel skel-line" style="width:35%"></div><div class="skel skel-line" style="width:20%"></div></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-btn"></div><div class="skel skel-btn"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  let allOrders = [];
  let activeFilter = 'all';

  function showToast(msg, isError = false) {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.innerHTML = `<span class="toast-icon">${isError ? '⚠' : '✓'}</span>${msg}`;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function statusLabel(s) {
    const map = { pending: '⏳ Pending', approved: '✓ Approved', rejected: '✕ Rejected' };
    return map[s] || s;
  }

  function renderOrders(orders) {
    const el = document.getElementById('orders');
    const filtered = activeFilter === 'all' ? orders : orders.filter(o => o.status === activeFilter);

    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <h3>No orders found</h3>
          <p>Nothing matches this filter right now.</p>
        </div>`;
      return;
    }

    el.innerHTML = filtered.map((o, i) => `
      <div class="order-row" id="row-${o.id}">
        <div class="order-num">#${String(o.id).padStart(3, '0')}</div>
        <div class="order-info">
          <div class="order-id">Order ${o.id}</div>
          <div class="order-meta">User ID: ${o.user_id || '—'}</div>
        </div>
        <div class="status-badge ${o.status}">${statusLabel(o.status)}</div>
        <div class="actions">
          <button class="action-btn btn-approve" onclick="update(${o.id}, 'approved')"
            ${o.status === 'approved' ? 'disabled' : ''}>✓ OK</button>
          <button class="action-btn btn-reject" onclick="update(${o.id}, 'rejected')"
            ${o.status === 'rejected' ? 'disabled' : ''}>✕ No</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent    = orders.length;
    document.getElementById('statPending').textContent  = orders.filter(o => o.status === 'pending').length;
    document.getElementById('statApproved').textContent = orders.filter(o => o.status === 'approved').length;
    document.getElementById('statRejected').textContent = orders.filter(o => o.status === 'rejected').length;
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(allOrders);
  }

  fetch('http://localhost:3000/orders')
    .then(res => res.json())
    .then(data => {
      allOrders = data;
      updateStats(data);
      renderOrders(data);
    })
    .catch(() => {
      document.getElementById('orders').innerHTML =
        '<p style="color:var(--muted);padding:20px 0;">Could not load orders.</p>';
    });

  function update(id, status) {
    const row = document.getElementById(`row-${id}`);
    const btns = row.querySelectorAll('.action-btn');
    btns.forEach(b => b.disabled = true);

    fetch(`http://localhost:3000/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    })
    .then(() => {
      // Update in-memory data
      const order = allOrders.find(o => o.id === id);
      if (order) order.status = status;

      updateStats(allOrders);
      renderOrders(allOrders);

      const label = status === 'approved' ? 'approved ✓' : 'rejected ✕';
      showToast(`Order #${String(id).padStart(3,'0')} ${label}`);
    })
    .catch(() => {
      btns.forEach(b => b.disabled = false);
      showToast('Failed to update order.', true);
    });
  }
</script>

</body>
</html>
